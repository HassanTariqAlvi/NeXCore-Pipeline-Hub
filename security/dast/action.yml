name: 'DAST - OWASP ZAP'
description: 'Full API security scan using OWASP ZAP with OpenAPI spec'

inputs:
  api-target:
    required: false
    default: 'http://localhost:3001'
    description: 'Base URL for the API service'
  options-target:
    required: false
    default: 'http://localhost:3002'
    description: 'Base URL for the options service'
  compose-file:
    required: false
    default: 'docker-compose.yml'
    description: 'Docker Compose file to use'

runs:
  using: composite
  steps:
    - uses: actions/checkout@v4

    - name: Start services via Docker Compose
      shell: bash
      run: |
        docker compose -f ${{ inputs.compose-file }} up -d --build
        echo "Waiting for services to be healthy..."
        timeout 120 bash -c 'until docker compose ps | grep -E "api-service.*healthy"; do sleep 3; done'
        timeout 120 bash -c 'until docker compose ps | grep -E "options-service.*healthy"; do sleep 3; done'

    - name: Verify OpenAPI specs are accessible
      shell: bash
      run: |
        curl -sf ${{ inputs.api-target }}/api-docs.json | jq '.info.title'
        curl -sf ${{ inputs.options-target }}/api-docs.json | jq '.info.title'

    - name: ZAP API Scan - API Service
      uses: zaproxy/action-api-scan@v0.9.0
      with:
        target: '${{ inputs.api-target }}/api-docs.json'
        format: openapi
        fail_action: false
        artifact_name: zap-api-service-report
        cmd_options: '-I'

    - name: ZAP API Scan - Options Service
      uses: zaproxy/action-api-scan@v0.9.0
      with:
        target: '${{ inputs.options-target }}/api-docs.json'
        format: openapi
        fail_action: false
        artifact_name: zap-options-service-report
        cmd_options: '-I'

    - name: Stop services
      if: always()
      shell: bash
      run: docker compose -f ${{ inputs.compose-file }} down
