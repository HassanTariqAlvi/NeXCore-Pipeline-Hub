name: 'DAST - OWASP ZAP'
description: 'Dynamic application security testing using OWASP ZAP against a locally running app'

inputs:
  api-target:
    required: false
    default: 'http://localhost:3001'
    description: 'Target URL for the API service'
  options-target:
    required: false
    default: 'http://localhost:3002'
    description: 'Target URL for the options service'
  compose-file:
    required: false
    default: 'docker-compose.yml'
    description: 'Docker Compose file to use'

runs:
  using: composite
  steps:
    - uses: actions/checkout@v4

    - name: Start services via Docker Compose
      shell: bash
      run: |
        docker compose -f ${{ inputs.compose-file }} up -d --build
        echo "Waiting for services to be healthy..."
        timeout 120 bash -c 'until docker compose ps | grep -E "api-service.*healthy"; do sleep 3; done'
        timeout 120 bash -c 'until docker compose ps | grep -E "options-service.*healthy"; do sleep 3; done'

    - name: ZAP Baseline Scan - API Service
      uses: zaproxy/action-baseline@v0.14.0
      with:
        target: ${{ inputs.api-target }}
        rules_file_name: .zap/rules.tsv
        cmd_options: '-a'
        fail_action: false
        artifact_name: zap-api-service-report

    - name: ZAP Baseline Scan - Options Service
      uses: zaproxy/action-baseline@v0.14.0
      with:
        target: ${{ inputs.options-target }}
        rules_file_name: .zap/rules.tsv
        cmd_options: '-a'
        fail_action: false
        artifact_name: zap-options-service-report

    - name: Stop services
      if: always()
      shell: bash
      run: docker compose -f ${{ inputs.compose-file }} down
