name: 'Dependency Audit'
description: 'Run npm audit for a Node.js service'

inputs:
  service:
    required: true
    description: 'Service directory name (e.g. api-service, frontend)'
  node-version:
    required: false
    default: '20'
    description: 'Node.js version to use'
  audit-level:
    required: false
    default: 'critical'
    description: 'Minimum severity level to report'

runs:
  using: composite
  steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm
        cache-dependency-path: ${{ inputs.service }}/package-lock.json

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.service }}
      run: npm ci

    - name: Run audit
      shell: bash
      working-directory: ${{ inputs.service }}
      run: npm audit --audit-level=${{ inputs.audit-level }}
      continue-on-error: true
