name: Container Scan - Trivy

on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string
      image:
        required: true
        type: string
      severity:
        required: false
        type: string
        default: 'CRITICAL,HIGH'

jobs:
  container-scan:
    name: Container Scan (${{ inputs.service }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ inputs.service }}
          push: false
          load: true
          tags: ${{ inputs.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Download Trivy HTML template
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/html.tpl \
            -o html.tpl

      - name: Trivy scan (HTML report)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ inputs.image }}:${{ github.sha }}
          format: template
          template: "@html.tpl"
          output: trivy-${{ inputs.service }}.html
          severity: ${{ inputs.severity }}
          exit-code: 0

      - name: Trivy scan (table summary)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ inputs.image }}:${{ github.sha }}
          format: table
          severity: ${{ inputs.severity }}
          exit-code: 0

      - name: Upload Trivy HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-${{ inputs.service }}-report
          path: trivy-${{ inputs.service }}.html
