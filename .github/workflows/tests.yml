name: Unit Tests

on:
  workflow_call:
    inputs:
      service:
        required: false
        type: string
        default: 'frontend'
      node-version:
        required: false
        type: string
        default: '20'

jobs:
  tests:
    name: Unit Tests (${{ inputs.service }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.service }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          cache-dependency-path: ${{ inputs.service }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --watchAll=false --passWithNoTests --coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ${{ inputs.service }}/coverage/
