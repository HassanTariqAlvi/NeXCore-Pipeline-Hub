name: Dependency Audit

on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string
      node-version:
        required: false
        type: string
        default: '20'
      audit-level:
        required: false
        type: string
        default: 'critical'

jobs:
  audit:
    name: Audit (${{ inputs.service }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.service }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          cache-dependency-path: ${{ inputs.service }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: npm audit
        run: npm audit --audit-level=${{ inputs.audit-level }}
        continue-on-error: true
